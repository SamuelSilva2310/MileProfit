# Host Nginx config — SSL termination → Docker frontend container
# Deploy: sudo cp nginx-host.conf /etc/nginx/sites-available/mileprofit
#         sudo ln -sf /etc/nginx/sites-available/mileprofit /etc/nginx/sites-enabled/mileprofit
#         sudo nginx -t && sudo systemctl reload nginx
# Then get SSL: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    server_name _;   # matches any IP, no domain needed

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
